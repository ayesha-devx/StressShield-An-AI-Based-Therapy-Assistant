<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/Manage.css">
    <title>SS-Manage</title>

    <style>
        /* Popup Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            width: 60%;
            height: 70%;
            border-radius: 10px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 25px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 90%;
            border: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans";
            background-color: #333333;
            /* Ensure path is correct */
            background-size: cover;
            background-position: center center;
            /* Centers the main focus of the image */
            background-repeat: no-repeat;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Prevent horizontal scrolling */
        }

        /* General styles for header and menu */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(51, 51, 51, 0.8);
            padding: 20px;
        }

        .menu-button {
            display: none;
            /* Hidden by default on larger screens */
            font-size: 24px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Mobile view (up to 600px) */
        @media (max-width: 600px) {

            /* Show the menu button */
            .menu-button {
                display: block;
            }

            /* Hide the menu by default */
            nav#menu {
                display: none;
                flex-direction: column;
                gap: 20px;
                background-color: rgba(51, 51, 51, 0.9);
                position: absolute;
                top: 60px;
                /* Adjust based on header height */
                left: 0;
                width: 100%;
                padding: 10px;
                z-index: 10;
            }

            /* Show the menu when it has the "active" class */
            nav#menu.active {
                display: flex;
            }

            /* Style the links for mobile view */
            nav#menu ul {
                flex-direction: column;
                align-items: center;
            }

            nav#menu ul li {
                margin: 10px 0;
            }
        }



        ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        ul li {
            margin: 0 10px;
        }

        ul li a {
            text-decoration: none;
            font-weight: 500;
            padding: 5px;
            color: white;
            font-weight: bold;
        }

        ul li a:hover {
            text-decoration: underline;
        }

        /* links */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            width: 1005;
            height: 100%;
        }

        .grid-container a {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: 2px solid #333333;
            text-align: center;
        }

        .grid-container a:nth-child(1) {
            background-color: #c8b9c8;
        }

        .grid-container a:nth-child(2) {
            background-color: #f3b5b5;
        }

        .grid-container a:nth-child(3) {
            background-color: #f3b5b5;
        }

        .grid-container a:nth-child(4) {
            background-color: #c8b9c8;
        }

        @media (max-width: 600px) {
            .main_menu {
                flex-direction: column;
                align-items: center;
            }

            .login {
                margin-left: 0;
                margin-top: 10px;
            }
        }

        .main_menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Login/Logout alignment */
        .login {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .login a {
            color: white;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 10px;
        }

        .login a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header>
        <button class="menu-button" onclick="toggleMenu()">☰ Menu</button>
        <nav id="menu">
            <div class="main_menu">
                <ul>
                    <li><a href="/home">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li id="identifyBtn"><a href="/Identify">Identify</a></li>
                    <li id="manageBtn"><a href="/Manage">Manage</a></li>
                    <li id="dashboardBtn"><a href="/Dashboard">Dashboard</a></li>
                </ul>
                <!-- Login section outside the ul to position it right -->
                <div class="login">
                    <a href="/login" id="loginBtn">Login</a>
                    <a href="/logout" id="logoutBtn" style="display: none;">Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="grid-container">
        <a href="#" onclick="openPopup('/manage/zero.html')">Stress Level is Zero</a>
        <a href="#" onclick="openPopup('/manage/low.html')">Stress Level is Low</a>
        <a href="#" onclick="openPopup('/manage/moderate.html')">Stress Level is Moderate</a>
        <a href="#" onclick="openPopup('/manage/high.html')">Stress Level is High</a>
    </div>

    <!-- Modal Popup -->
    <div id="popupModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePopup()">&times;</span>
            <iframe id="popupFrame" src=""></iframe>
        </div>
    </div>

    <script>
        // Toggle Menu
        function toggleMenu() {
            var menu = document.getElementById("menu");
            menu.classList.toggle("active");
        }

        // Open Popup
        function openPopup(page) {
            document.getElementById("popupFrame").src = page;
            document.getElementById("popupModal").style.display = "flex";
        }

        // Close Popup
        function closePopup() {
            document.getElementById("popupModal").style.display = "none";
            document.getElementById("popupFrame").src = "";
        }

        document.addEventListener("DOMContentLoaded", async function () {
            const loginBtn = document.getElementById("loginBtn");
            const logoutBtn = document.getElementById("logoutBtn");

            // New nav elements
            const identifyBtn = document.getElementById("identifyBtn");
            const manageBtn = document.getElementById("manageBtn");
            const dashboardBtn = document.getElementById("dashboardBtn");

            // Hide buttons initially (for safety)
            identifyBtn.style.display = "none";
            manageBtn.style.display = "none";
            dashboardBtn.style.display = "none";

            // Check login session from server
            async function checkLoginStatus() {
                try {
                    const res = await fetch("/authUser");
                    if (res.ok) {
                        // User is logged in
                        loginBtn.style.display = "none";
                        logoutBtn.style.display = "inline-block";
                        identifyBtn.style.display = "list-item";
                        manageBtn.style.display = "list-item";
                        dashboardBtn.style.display = "list-item";
                    } else {
                        // Not logged in
                        loginBtn.style.display = "inline-block";
                        logoutBtn.style.display = "none";
                        identifyBtn.style.display = "none";
                        manageBtn.style.display = "none";
                        dashboardBtn.style.display = "none";
                    }
                } catch (err) {
                    console.error("Error checking login status:", err);
                    loginBtn.style.display = "inline-block";
                    logoutBtn.style.display = "none";
                    identifyBtn.style.display = "none";
                    manageBtn.style.display = "none";
                    dashboardBtn.style.display = "none";
                }
            }

            // Logout handler
            logoutBtn.addEventListener("click", function (e) {
                e.preventDefault();
                fetch("/logout").then(() => {
                    loginBtn.style.display = "inline-block";
                    logoutBtn.style.display = "none";
                    identifyBtn.style.display = "none";
                    manageBtn.style.display = "none";
                    dashboardBtn.style.display = "none";
                    window.location.href = "/home"; // Optional redirect
                });
            });

            await checkLoginStatus();
        });

    </script>

</body>

</html>
