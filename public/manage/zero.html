<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill Vibes 😎</title>
    <style>
        body {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            color: #333333;
            background-color: #f3b5b5;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5em;
            line-height: 1.6;
        }
        .emoji {
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>You're so chill 😎✨</h1>
    <p>
        Hey there!! <span class="emoji">🌸</span><br>
        Just a reminder: your stress level is as low as a fluffy cloud ☁️💆‍♂️<br>
        You're handling everything with such ease—keep shining! 🌞🌟
    </p>
</body>
</html>
